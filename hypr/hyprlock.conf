background {
    monitor =
    path = screenshot 
    color = rgb(41, 20, 20)
    blur_size = 4
    blur_passes = 3 # 0 disables blurring
    noise = 0.0117
    contrast = 1.000
    brightness = 1.0000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.64
    dots_center = true
    outer_color = rgb(228, 104, 103)
    inner_color = rgb(41, 20, 20)
    font_color = rgb(228, 104, 103)
    fail_color = rgb(190, 41, 40)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    fade_on_empty = true
    hide_input = false
    position = 0, -130
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =  $USER
    color = rgb(228, 104, 103)
    font_size = 20
    font_family = JetBrains Mono Nerd Font 10
    position = 0, -50
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgb(243, 242, 242)
    font_size = 18
    font_family = JetBrains Mono Nerd Font 10
    position = 0, 30
    halign = center
    valign = center
}

# Current time
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = rgb(228, 104, 103)
    font_size = 64
    font_family = JetBrains Mono Nerd Font 10
    position = 0, 100
    halign = center
    valign = center
}
